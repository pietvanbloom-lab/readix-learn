<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--ink-black); color: var(--fg-on-ink); }
  .row { display: grid; grid-template-columns: 80px 1fr; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--gray-800); }
  .row:last-child { border-bottom: 0; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); }
  .spec { font-family: var(--font-display); color: var(--paper-warm); }
</style>
</head>
<body>
<div class="row"><div class="lbl">5XL · 64</div><div class="spec" style="font-size:48px;line-height:1">Engineered</div></div>
<div class="row"><div class="lbl">3XL · 48</div><div class="spec" style="font-size:36px;line-height:1.05">Section opener</div></div>
<div class="row"><div class="lbl">XL · 32</div><div class="spec" style="font-size:24px;line-height:1.1;font-style:italic">the prompt</div></div>
<div class="row"><div class="lbl">MD · 22</div><div class="spec" style="font-size:18px;font-family:var(--font-sans);color:var(--fg-on-ink-mute)">Lead paragraph in sans</div></div>
<div class="row"><div class="lbl">XS · 12</div><div class="spec" style="font-size:11px;font-family:var(--font-mono);letter-spacing:0.15em;text-transform:uppercase;color:var(--copper)">● 02 · EYEBROW</div></div>
</body>
</html>
