<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 40px; background: var(--ink-black); display: flex; flex-direction: column; gap: 24px; }
  .lockup { display: flex; align-items: baseline; gap: 12px; }
  .mark { font-family: var(--font-display); font-size: 36px; letter-spacing: -0.02em; color: var(--paper-warm); font-weight: 600; }
  .mark .am { color: var(--copper); }
  .ver { font-family: var(--font-mono); font-size: 12px; color: var(--gray-400); letter-spacing: 0.05em; }
  .lockup.dark { background: var(--paper-warm); padding: 16px 20px; }
  .lockup.dark .mark { color: var(--ink-black); }
  .lockup.dark .ver { color: var(--copper-deep); }
</style>
</head>
<body>
<div class="lockup"><div class="mark">CODEX<span class="am">&</span>CO</div><div class="ver">v.2026.05</div></div>
<div class="lockup dark"><div class="mark">CODEX<span class="am">&</span>CO</div><div class="ver">v.2026.05</div></div>
</body>
</html>
