<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--ink-black); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { aspect-ratio: 1.4; padding: 12px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid var(--gray-800); }
  .name { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
  .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.7; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:#D97757;color:#0A0A0B"><div class="name">copper</div><div class="hex">#D97757</div></div>
  <div class="sw" style="background:#B85F40;color:#FAF9F5"><div class="name">copper-deep</div><div class="hex">#B85F40</div></div>
  <div class="sw" style="background:#FFC47C;color:#0A0A0B"><div class="name">ochre</div><div class="hex">#FFC47C</div></div>
  <div class="sw" style="background:#8B3A1F;color:#FAF9F5"><div class="name">rust</div><div class="hex">#8B3A1F</div></div>
</div>
</body>
</html>
