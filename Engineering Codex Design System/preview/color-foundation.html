<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--gray-900); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { aspect-ratio: 1.4; padding: 12px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid var(--gray-800); }
  .name { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
  .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.6; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:#0A0A0B;color:#E8E8E8"><div class="name">ink-black</div><div class="hex">#0A0A0B</div></div>
  <div class="sw" style="background:#14151A;color:#E8E8E8"><div class="name">ink-deep</div><div class="hex">#14151A</div></div>
  <div class="sw" style="background:#091423;color:#E8E8E8"><div class="name">ink-night</div><div class="hex">#091423</div></div>
  <div class="sw" style="background:#F0E6D2;color:#1A1A1A"><div class="name">paper-warm</div><div class="hex">#F0E6D2</div></div>
  <div class="sw" style="background:#FAF9F5;color:#1A1A1A"><div class="name">paper-light</div><div class="hex">#FAF9F5</div></div>
</div>
</body>
</html>
