<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: var(--ink-black); }
  .eb { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--copper); margin-bottom: 18px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 24px; align-items: center; }
  .lg { font-family: var(--font-display); font-style: italic; font-size: 18px; color: var(--gray-400); text-align: center; opacity: 0.8; }
  .mono { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.08em; color: var(--gray-400); text-align: center; }
</style>
</head>
<body>
<div class="eb">● TRUSTED BY</div>
<div class="row">
  <div class="lg">Halberd</div>
  <div class="mono">NORTHWIND</div>
  <div class="lg">Atrius</div>
  <div class="mono">FOUNDRY/CO</div>
  <div class="lg">Veritas</div>
  <div class="mono">MERIDIAN</div>
</div>
</body>
</html>
