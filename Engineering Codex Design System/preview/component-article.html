<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--ink-black); display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .a { display: flex; flex-direction: column; gap: 10px; }
  .img { aspect-ratio: 1; background: linear-gradient(135deg, #273951, #091423); border: 1px solid var(--gray-800); }
  .img.b { background: linear-gradient(135deg, #6B5D45, #1A1A1A); }
  .cat { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--copper); }
  .h { font-family: var(--font-display); font-size: 22px; line-height: 1.15; color: var(--paper-warm); letter-spacing: -0.01em; }
  .by { font-family: var(--font-mono); font-size: 11px; color: var(--gray-400); letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="a"><div class="img"></div><div class="cat">PERSPECTIVE · READ</div><div class="h">The end of the dashboard era.</div><div class="by">By M. Ostrowski · 12 min</div></div>
<div class="a"><div class="img b"></div><div class="cat">FIELD NOTE · READ</div><div class="h">Why most procurement reports lie about uptime.</div><div class="by">By J. Ranganathan · 6 min</div></div>
</body>
</html>
