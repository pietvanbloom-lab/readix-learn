<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--ink-black); display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .swatch { aspect-ratio: 1.4; padding: 12px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid var(--border-on-paper); }
  .grain { background: var(--paper-warm); position: relative; }
  .grain::after { content: ""; position: absolute; inset: 0; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.12'/></svg>"); mix-blend-mode: multiply; pointer-events:none; }
  .hatch { background: var(--paper-warm); background-image: repeating-linear-gradient(45deg, var(--border-on-paper) 0 1px, transparent 1px 8px); }
  .torn { background: var(--paper-warm); -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 70' preserveAspectRatio='none'><path d='M0,3 Q10,0 20,2 T40,3 T60,1 T80,3 T100,2 L100,68 Q90,70 80,68 T60,69 T40,67 T20,69 T0,68 Z' fill='black'/></svg>"); -webkit-mask-size: 100% 100%; mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 70' preserveAspectRatio='none'><path d='M0,3 Q10,0 20,2 T40,3 T60,1 T80,3 T100,2 L100,68 Q90,70 80,68 T60,69 T40,67 T20,69 T0,68 Z' fill='black'/></svg>"); mask-size: 100% 100%; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-on-paper-mute); position: relative; z-index: 1; }
</style>
</head>
<body>
<div class="swatch grain"><div class="lbl">GRAIN · 12% noise</div></div>
<div class="swatch hatch"><div class="lbl">HATCH · 45° / 8px</div></div>
<div class="swatch torn"><div class="lbl">TORN EDGE</div></div>
</body>
</html>
