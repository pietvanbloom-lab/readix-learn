<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--ink-black); color: var(--fg-on-ink); display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 8px; }
  .ui { font-family: var(--font-sans); font-size: 16px; line-height: 1.55; color: var(--fg-on-ink); }
  .pr { font-family: var(--font-prose); font-size: 16px; line-height: 1.7; color: var(--fg-on-ink); }
</style>
</head>
<body>
<div>
  <div class="lbl">UI · INTER 16/1.55</div>
  <p class="ui">A standard interface paragraph. Forms, lists, navigation, dashboards — anywhere density and clarity matter more than warmth.</p>
</div>
<div>
  <div class="lbl">PROSE · LORA 16/1.7</div>
  <p class="pr">A long-read research excerpt. Serif body signals research credibility, in the Anthropic mode. Reserved for briefs and field notes.</p>
</div>
</body>
</html>
