<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--ink-black); display: flex; flex-direction: column; gap: 6px; }
  .row { display: grid; grid-template-columns: 70px 80px 1fr; align-items: center; gap: 12px; }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--ochre); }
  .bar { height: 12px; background: var(--copper); }
</style>
</head>
<body>
<div class="row"><div class="name">s-1</div><div class="px">4 px</div><div class="bar" style="width:4px"></div></div>
<div class="row"><div class="name">s-2</div><div class="px">8 px</div><div class="bar" style="width:8px"></div></div>
<div class="row"><div class="name">s-3</div><div class="px">12 px</div><div class="bar" style="width:12px"></div></div>
<div class="row"><div class="name">s-4</div><div class="px">16 px</div><div class="bar" style="width:16px"></div></div>
<div class="row"><div class="name">s-5</div><div class="px">24 px</div><div class="bar" style="width:24px"></div></div>
<div class="row"><div class="name">s-6</div><div class="px">32 px</div><div class="bar" style="width:32px"></div></div>
<div class="row"><div class="name">s-7</div><div class="px">48 px</div><div class="bar" style="width:48px"></div></div>
<div class="row"><div class="name">s-8</div><div class="px">64 px</div><div class="bar" style="width:64px"></div></div>
<div class="row"><div class="name">s-9</div><div class="px">96 px</div><div class="bar" style="width:96px"></div></div>
<div class="row"><div class="name">s-10</div><div class="px">160 px</div><div class="bar" style="width:160px"></div></div>
</body>
</html>
