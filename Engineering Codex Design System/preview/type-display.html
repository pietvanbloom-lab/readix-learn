<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; background: var(--ink-black); }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 14px; }
  .display { font-family: var(--font-display); font-weight: 600; font-size: 64px; line-height: 0.95; letter-spacing: -0.025em; color: var(--paper-warm); }
  .display em { font-weight: 400; color: var(--copper); }
</style>
</head>
<body>
<div class="meta">DISPLAY · 64 / 0.95 / -0.025em</div>
<div class="display">Research engineered, <em>not generated.</em></div>
</body>
</html>
