<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 32px; background: var(--ink-black); display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .stat { border-top: 1px solid var(--gray-800); padding-top: 12px; }
  .num { font-family: var(--font-display); font-size: 48px; letter-spacing: -0.025em; line-height: 1; color: var(--paper-warm); }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); margin-top: 8px; }
</style>
</head>
<body>
<div class="stat"><div class="num">48h</div><div class="lbl">standard turnaround</div></div>
<div class="stat"><div class="num">97%</div><div class="lbl">client retention</div></div>
<div class="stat"><div class="num">300+</div><div class="lbl">briefs delivered</div></div>
<div class="stat"><div class="num">24</div><div class="lbl">industries covered</div></div>
</body>
</html>
