<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; background: var(--ink-black); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 16px; align-items: baseline; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-400); width: 80px; }
  .eb { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--copper); }
  .cap { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.05em; color: var(--gray-400); }
  .ver { font-family: var(--font-mono); font-size: 12px; color: var(--ochre); }
</style>
</head>
<body>
<div class="row"><div class="lbl">EYEBROW</div><div class="eb">● 02 · WHY ONE MODEL ISN'T ENOUGH</div></div>
<div class="row"><div class="lbl">FIG</div><div class="cap">FIG 0.2 · The Codex stack, Q1 2026</div></div>
<div class="row"><div class="lbl">VERSION</div><div class="ver">v.2026.05</div></div>
<div class="row"><div class="lbl">DIM</div><div class="cap">↤ 720px UP ↦</div></div>
</body>
</html>
