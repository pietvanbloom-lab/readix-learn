<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Imagery exploration — Codex × Comic mechanical</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #1a1a1a; }
  .parchment {
    background: radial-gradient(ellipse at center, #F0E6D2 0%, #E0D2B5 100%);
    color: var(--fg-on-paper);
    position: relative;
    overflow: hidden;
  }
  .parchment::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.18'/></svg>");
    mix-blend-mode: multiply; pointer-events: none;
  }
  .parchment::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(80,50,20,0.18) 100%);
    pointer-events: none;
  }
  .stage { width: 100%; height: 100%; padding: 32px; display: grid; grid-template-rows: auto 1fr auto; gap: 16px; position: relative; z-index: 1; box-sizing: border-box; }
  .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #8B3A1F; white-space: nowrap; }
  .ver { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: #6B5D45; white-space: nowrap; }
  .name { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.01em; color: #2A1810; margin-top: 4px; white-space: nowrap; }
  .italic { font-family: var(--font-display); font-style: italic; font-size: 15px; color: #6B5D45; margin-top: 2px; }
  .center { display: flex; align-items: center; justify-content: center; }
  .center svg { width: 100%; height: 100%; max-height: 380px; }
  .foot { display: flex; justify-content: space-between; align-items: end; gap: 16px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: #6B5D45; letter-spacing: 0.05em; line-height: 1.4; }
  .cta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #B85F40; white-space: nowrap; }
  /* Drawing styles — heavier, comic-book ink */
  .ink { stroke: #2A1810; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .ink-bold { stroke: #1A0F08; fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; }
  .ink-thin { stroke: #4A3520; fill: none; stroke-width: 0.9; stroke-linecap: round; }
  .ink-fine { stroke: #5A4530; fill: none; stroke-width: 0.5; stroke-linecap: round; }
  .copper { stroke: #B85F40; fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
  .copper-bold { stroke: #8B3A1F; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .copper-fill { fill: #B85F40; }
  .copper-deep-fill { fill: #8B3A1F; }
  .ink-fill { fill: #2A1810; }
  .dim { stroke: #B85F40; fill: none; stroke-width: 0.6; stroke-dasharray: 2 1.5; }
  .label { font-family: 'JetBrains Mono', monospace; fill: #B85F40; font-size: 7px; letter-spacing: 0.1em; font-weight: 700; }
  .label-ink { font-family: 'JetBrains Mono', monospace; fill: #2A1810; font-size: 7px; letter-spacing: 0.05em; font-weight: 700; }
  .logo-text { font-family: 'JetBrains Mono', monospace; fill: #1A0F08; font-size: 6px; font-weight: 700; letter-spacing: 0.05em; }
  /* Comic-book "BAM"-style burst */
  .burst-fill { fill: #FFC47C; }
  .burst-stroke { stroke: #2A1810; stroke-width: 2; fill: none; stroke-linejoin: round; }
  .burst-text { font-family: 'GT Sectra', 'Source Serif 4', serif; font-style: italic; font-weight: 700; fill: #2A1810; font-size: 14px; letter-spacing: 0.02em; }
  /* Speech-line motion */
  .swoosh { stroke: #2A1810; fill: none; stroke-width: 1.6; stroke-linecap: round; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">

const Defs = () => (
  <defs>
    <pattern id="hatch" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#2A1810" strokeWidth="0.6" opacity="0.85" />
    </pattern>
    <pattern id="hatch-cross" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="4" stroke="#2A1810" strokeWidth="0.4" opacity="0.7" />
      <line x1="0" y1="4" x2="4" y2="0" stroke="#2A1810" strokeWidth="0.4" opacity="0.5" />
    </pattern>
    <pattern id="dots" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="#2A1810" opacity="0.55"/>
    </pattern>
    <radialGradient id="glow-copper" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stopColor="#FFC47C" stopOpacity="1"/>
      <stop offset="60%" stopColor="#D97757" stopOpacity="0.85"/>
      <stop offset="100%" stopColor="#8B3A1F" stopOpacity="0.4"/>
    </radialGradient>
  </defs>
);

const DimX = ({ x1, x2, y, label }) => (
  <g>
    <line x1={x1} y1={y} x2={x2} y2={y} className="dim" />
    <line x1={x1} y1={y-2} x2={x1} y2={y+2} className="dim" />
    <line x1={x2} y1={y-2} x2={x2} y2={y+2} className="dim" />
    <text x={(x1+x2)/2} y={y-3} className="label" textAnchor="middle">{label}</text>
  </g>
);
const DimY = ({ y1, y2, x, label }) => (
  <g>
    <line x1={x} y1={y1} x2={x} y2={y2} className="dim" />
    <line x1={x-2} y1={y1} x2={x+2} y2={y1} className="dim" />
    <line x1={x-2} y1={y2} x2={x+2} y2={y2} className="dim" />
    <text x={x-3} y={(y1+y2)/2} className="label" textAnchor="end" transform={`rotate(-90 ${x-3} ${(y1+y2)/2})`}>{label}</text>
  </g>
);

const Arrow = ({ x1, y1, x2, y2, bold }) => {
  const a = Math.atan2(y2-y1, x2-x1);
  const ah = 5;
  const cls = bold ? "copper-bold" : "copper";
  return (
    <g className={cls}>
      <line x1={x1} y1={y1} x2={x2} y2={y2} />
      <line x1={x2} y1={y2} x2={x2 - ah*Math.cos(a-0.4)} y2={y2 - ah*Math.sin(a-0.4)} />
      <line x1={x2} y1={y2} x2={x2 - ah*Math.cos(a+0.4)} y2={y2 - ah*Math.sin(a+0.4)} />
    </g>
  );
};

// Comic-book starburst with text
const Burst = ({ x, y, r, text, rot=-12, points=14 }) => {
  const path = [];
  for (let i = 0; i < points*2; i++) {
    const ang = (i / (points*2)) * Math.PI * 2;
    const rr = i % 2 === 0 ? r : r * 0.66;
    path.push(`${i===0?'M':'L'} ${Math.cos(ang)*rr} ${Math.sin(ang)*rr}`);
  }
  path.push("Z");
  return (
    <g transform={`translate(${x}, ${y}) rotate(${rot})`}>
      <path d={path.join(" ")} className="burst-fill"/>
      <path d={path.join(" ")} className="burst-stroke"/>
      <text textAnchor="middle" y="4" className="burst-text">{text}</text>
    </g>
  );
};

// ─────────────────────────────────────────────────────
// MOCK 01 — "THE PRESS · MK II"
// Comic-book mechanical version: heavier ink, exposed
// pistons, motion swooshes, BRIEF! starburst, action lines.
// ─────────────────────────────────────────────────────
const PressComic = () => (
  <svg viewBox="0 0 400 320" preserveAspectRatio="xMidYMid meet">
    <Defs />
    {/* Action lines radiating from press center */}
    <g className="ink-thin" opacity="0.5">
      {[15,30,55,140,160,200,220,330,345].map(a => {
        const r1 = 90, r2 = 150;
        const rad = a * Math.PI / 180;
        return <line key={a} x1={200 + Math.cos(rad)*r1} y1={150 + Math.sin(rad)*r1} x2={200 + Math.cos(rad)*r2} y2={150 + Math.sin(rad)*r2}/>;
      })}
    </g>

    {/* Frame uprights — bold ink with cross-hatching shadow */}
    <rect x="60" y="40" width="18" height="220" fill="#E8DCC0"/>
    <rect x="60" y="40" width="18" height="220" className="ink-bold"/>
    <rect x="68" y="40" width="10" height="220" fill="url(#hatch)"/>
    <rect x="322" y="40" width="18" height="220" fill="#E8DCC0"/>
    <rect x="322" y="40" width="18" height="220" className="ink-bold"/>
    <rect x="330" y="40" width="10" height="220" fill="url(#hatch)"/>

    {/* Crossbeam with rivets */}
    <rect x="50" y="28" width="300" height="24" fill="#D8C8A8"/>
    <rect x="50" y="28" width="300" height="24" className="ink-bold"/>
    <rect x="50" y="44" width="300" height="8" fill="url(#hatch)"/>
    {[70,110,150,190,230,270,310].map(x => (
      <g key={x}>
        <circle cx={x} cy="40" r="3" className="ink-bold" fill="#B85F40"/>
        <circle cx={x-1} cy="39" r="1" fill="#FFC47C"/>
      </g>
    ))}

    {/* Screw shaft */}
    <line x1="200" y1="52" x2="200" y2="158" className="ink-bold"/>
    {/* Threaded coils — bigger ellipses */}
    {[60,76,92,108,124,140,156].map(y => (
      <g key={y}>
        <ellipse cx="200" cy={y} rx="16" ry="4" fill="#D8C8A8"/>
        <ellipse cx="200" cy={y} rx="16" ry="4" className="ink"/>
        <path d={`M 184 ${y} Q 200 ${y-2} 216 ${y}`} className="ink-thin"/>
      </g>
    ))}

    {/* Top knob — copper sphere with highlight */}
    <circle cx="200" cy="42" r="11" fill="url(#glow-copper)"/>
    <circle cx="200" cy="42" r="11" className="ink-bold"/>
    <ellipse cx="196" cy="38" rx="3" ry="2" fill="#FFC47C" opacity="0.85"/>

    {/* Lever arm with grip — comic exaggeration */}
    <line x1="200" y1="42" x2="290" y2="14" className="copper-bold" strokeWidth="3"/>
    <circle cx="290" cy="14" r="6" fill="#B85F40"/>
    <circle cx="290" cy="14" r="6" className="ink-bold"/>
    {/* Motion swooshes from lever */}
    <path d="M 296 12 Q 308 16 314 26" className="swoosh"/>
    <path d="M 300 8 Q 314 10 322 20" className="swoosh"/>

    {/* Press platen — fat ink */}
    <rect x="135" y="158" width="130" height="18" fill="#E8DCC0"/>
    <rect x="135" y="158" width="130" height="18" className="ink-bold"/>
    <rect x="135" y="170" width="130" height="6" fill="url(#hatch)"/>

    {/* Exposed pistons either side of platen */}
    <g>
      <rect x="105" y="155" width="22" height="8" fill="#D8C8A8"/>
      <rect x="105" y="155" width="22" height="8" className="ink"/>
      <rect x="95" y="148" width="14" height="22" fill="#E8DCC0"/>
      <rect x="95" y="148" width="14" height="22" className="ink-bold"/>
      <rect x="98" y="151" width="8" height="16" fill="url(#hatch)"/>
    </g>
    <g>
      <rect x="273" y="155" width="22" height="8" fill="#D8C8A8"/>
      <rect x="273" y="155" width="22" height="8" className="ink"/>
      <rect x="291" y="148" width="14" height="22" fill="#E8DCC0"/>
      <rect x="291" y="148" width="14" height="22" className="ink-bold"/>
      <rect x="294" y="151" width="8" height="16" fill="url(#hatch)"/>
    </g>

    {/* Tray with parchment */}
    <rect x="115" y="194" width="170" height="58" fill="#FAF3E0"/>
    <rect x="115" y="194" width="170" height="58" className="ink-bold"/>
    {/* Document lines */}
    <line x1="130" y1="206" x2="270" y2="206" className="ink"/>
    <line x1="130" y1="214" x2="245" y2="214" className="ink-thin"/>
    <line x1="130" y1="222" x2="260" y2="222" className="ink-thin"/>
    {/* Embedded chip-logo on document */}
    <rect x="130" y="232" width="18" height="14" fill="#FAF3E0"/>
    <rect x="130" y="232" width="18" height="14" className="ink-bold"/>
    <text x="139" y="242" className="logo-text" textAnchor="middle">G/AI</text>
    <line x1="153" y1="237" x2="225" y2="237" className="ink-thin"/>
    <line x1="153" y1="244" x2="210" y2="244" className="ink-thin"/>

    {/* Base — chunky */}
    <rect x="38" y="252" width="324" height="22" fill="#D8C8A8"/>
    <rect x="38" y="252" width="324" height="22" className="ink-bold"/>
    <rect x="38" y="266" width="324" height="8" fill="url(#hatch)"/>
    {/* Feet */}
    <rect x="55" y="274" width="22" height="10" className="ink-bold" fill="#E8DCC0"/>
    <rect x="323" y="274" width="22" height="10" className="ink-bold" fill="#E8DCC0"/>

    {/* Steam puffs from pistons */}
    <g className="ink" opacity="0.7">
      <path d="M 102 145 Q 95 138 100 130 Q 106 124 100 116" strokeDasharray="2 1.5" fill="none"/>
      <path d="M 109 145 Q 116 138 110 130" strokeDasharray="2 1.5" fill="none"/>
      <path d="M 297 145 Q 304 138 299 130 Q 293 124 299 116" strokeDasharray="2 1.5" fill="none"/>
      <path d="M 290 145 Q 283 138 289 130" strokeDasharray="2 1.5" fill="none"/>
    </g>

    {/* Comic burst — "STAMP!" */}
    <Burst x={70} y={120} r={28} text="STAMP!" rot={-15} points={11}/>

    {/* Annotations */}
    <Arrow x1="370" y1="170" x2="306" y2="166" bold/>
    <text x="370" y="173" className="label" textAnchor="end">PISTON · 2T</text>
    <Arrow x1="370" y1="220" x2="290" y2="222" bold/>
    <text x="370" y="223" className="label" textAnchor="end">8 PG · OUT</text>

    {/* Dimensions */}
    <DimX x1="115" x2="285" y={295} label="W. 170" />
    <DimY y1="40" y2="252" x={26} label="H. 212" />

    {/* UP marker */}
    <g transform="translate(360,28)">
      <line x1="0" y1="6" x2="0" y2="-2" className="copper-bold"/>
      <line x1="-2" y1="0" x2="0" y2="-3" className="copper-bold"/>
      <line x1="2" y1="0" x2="0" y2="-3" className="copper-bold"/>
      <text x="4" y="2" className="label">UP</text>
    </g>

    {/* corner cross-marks */}
    <g className="copper-bold">
      <line x1="20" y1="20" x2="28" y2="20"/><line x1="24" y1="16" x2="24" y2="24"/>
      <line x1="372" y1="20" x2="380" y2="20"/><line x1="376" y1="16" x2="376" y2="24"/>
      <line x1="20" y1="300" x2="28" y2="300"/><line x1="24" y1="296" x2="24" y2="304"/>
      <line x1="372" y1="300" x2="380" y2="300"/><line x1="376" y1="296" x2="376" y2="304"/>
    </g>
  </svg>
);

// ─────────────────────────────────────────────────────
// MOCK 02 — "THE ENGINE · MK II"
// Comic-book mechanical: thick-outlined gear assembly,
// glowing copper core, exposed pipes/vents,
// "CLANK!" starburst, motion lines, embedded chip pulse.
// ─────────────────────────────────────────────────────
const EngineComic = () => (
  <svg viewBox="0 0 400 320" preserveAspectRatio="xMidYMid meet">
    <Defs />

    {/* Backing plate with rivets */}
    <rect x="40" y="55" width="320" height="210" fill="#E8DCC0"/>
    <rect x="40" y="55" width="320" height="210" className="ink-bold"/>
    <rect x="40" y="55" width="320" height="210" fill="url(#hatch)" opacity="0.4"/>
    {/* Inset panel */}
    <rect x="50" y="65" width="300" height="190" className="ink" fill="none"/>
    {/* Rivets */}
    {[[60,75],[200,75],[340,75],[60,245],[200,245],[340,245],[60,160],[340,160]].map(([x,y],i) => (
      <g key={i}>
        <circle cx={x} cy={y} r="4" fill="#B85F40"/>
        <circle cx={x} cy={y} r="4" className="ink-bold"/>
        <circle cx={x-1} cy={y-1} r="1.2" fill="#FFC47C"/>
      </g>
    ))}

    {/* Action lines around primary gear */}
    <g className="ink-thin" opacity="0.55">
      {[10,40,70,100,130,160,210,240,270,300,330].map(a => {
        const r1 = 60, r2 = 80;
        const rad = a * Math.PI / 180;
        return <line key={`pa${a}`} x1={140 + Math.cos(rad)*r1} y1={160 + Math.sin(rad)*r1} x2={140 + Math.cos(rad)*r2} y2={160 + Math.sin(rad)*r2}/>;
      })}
    </g>

    {/* PRIMARY GEAR (large, left-center) */}
    <g transform="translate(140, 160)">
      {/* gear teeth — thicker, beveled */}
      {Array.from({length:14}).map((_,i) => {
        const a = (i / 14) * Math.PI * 2;
        const r1 = 38, r2 = 50;
        const ang = 0.22;
        const x1 = Math.cos(a-ang) * r1, y1 = Math.sin(a-ang) * r1;
        const x2 = Math.cos(a-ang*0.65) * r2, y2 = Math.sin(a-ang*0.65) * r2;
        const x3 = Math.cos(a+ang*0.65) * r2, y3 = Math.sin(a+ang*0.65) * r2;
        const x4 = Math.cos(a+ang) * r1, y4 = Math.sin(a+ang) * r1;
        return <path key={i} d={`M${x1},${y1} L${x2},${y2} L${x3},${y3} L${x4},${y4} Z`} className="ink-bold" fill="#D97757"/>;
      })}
      {/* gear body */}
      <circle r="38" fill="#E8DCC0"/>
      <circle r="38" className="ink-bold"/>
      <circle r="38" fill="url(#hatch)" opacity="0.5"/>
      {/* spoke ring */}
      <circle r="24" fill="#D8C8A8"/>
      <circle r="24" className="ink"/>
      {/* spokes — bold */}
      {[0,72,144,216,288].map(a => {
        const rad = a * Math.PI / 180;
        return <g key={a}>
          <line x1={Math.cos(rad)*7} y1={Math.sin(rad)*7} x2={Math.cos(rad)*22} y2={Math.sin(rad)*22} className="ink-bold"/>
        </g>;
      })}
      {/* glowing copper core */}
      <circle r="11" fill="url(#glow-copper)"/>
      <circle r="11" className="ink-bold"/>
      <circle r="4" className="ink-fill"/>
    </g>

    {/* DRIVE GEAR (right) */}
    <g transform="translate(258, 160)">
      {Array.from({length:10}).map((_,i) => {
        const a = (i / 10) * Math.PI * 2 + 0.3;
        const r1 = 24, r2 = 34;
        const ang = 0.27;
        const x1 = Math.cos(a-ang) * r1, y1 = Math.sin(a-ang) * r1;
        const x2 = Math.cos(a-ang*0.65) * r2, y2 = Math.sin(a-ang*0.65) * r2;
        const x3 = Math.cos(a+ang*0.65) * r2, y3 = Math.sin(a+ang*0.65) * r2;
        const x4 = Math.cos(a+ang) * r1, y4 = Math.sin(a+ang) * r1;
        return <path key={i} d={`M${x1},${y1} L${x2},${y2} L${x3},${y3} L${x4},${y4} Z`} className="ink-bold" fill="#D97757"/>;
      })}
      <circle r="24" fill="#E8DCC0"/>
      <circle r="24" className="ink-bold"/>
      <circle r="24" fill="url(#hatch)" opacity="0.5"/>
      <circle r="14" fill="#D8C8A8"/>
      <circle r="14" className="ink"/>
      <circle r="7" fill="url(#glow-copper)"/>
      <circle r="7" className="ink-bold"/>
      <circle r="2" className="ink-fill"/>
    </g>

    {/* Motion lines on right gear (counter-rotation) */}
    <g className="swoosh" strokeWidth="1.2">
      <path d="M 296 130 Q 304 122 308 130"/>
      <path d="M 300 145 Q 310 142 312 152"/>
    </g>

    {/* PRESSURE GAUGE top-left, larger and over-emphasized */}
    <g transform="translate(95, 110)">
      <circle r="26" fill="#FAF3E0"/>
      <circle r="26" className="ink-bold"/>
      <circle r="22" fill="none" className="copper-bold"/>
      {/* Tick marks */}
      {Array.from({length:11}).map((_,i) => {
        const a = (Math.PI * 1.2) + (i / 10) * (Math.PI * 1.6);
        return <g key={i}>
          <line x1={Math.cos(a)*18} y1={Math.sin(a)*18} x2={Math.cos(a)*22} y2={Math.sin(a)*22} className="ink"/>
        </g>;
      })}
      {/* Needle pegged to right (max) */}
      <line x1="0" y1="0" x2="16" y2="-10" className="copper-bold" strokeWidth="2"/>
      <circle r="4" fill="#B85F40"/>
      <circle r="4" className="ink-bold"/>
      <text x="0" y="18" className="label-ink" textAnchor="middle">PSI · MAX</text>
    </g>

    {/* Pipe from gauge — thick segmented */}
    <g>
      <path d="M 95 138 Q 95 156 110 165" fill="none" stroke="#D8C8A8" strokeWidth="9" strokeLinecap="round"/>
      <path d="M 95 138 Q 95 156 110 165" className="ink-bold" fill="none"/>
      <circle cx="95" cy="148" r="2" className="ink-fill"/>
      <circle cx="100" cy="160" r="2" className="ink-fill"/>
    </g>

    {/* Embedded chip top-right with pulse rings */}
    <g transform="translate(300, 100)">
      {/* pulse rings */}
      <circle r="22" className="copper" strokeDasharray="2 2" opacity="0.55"/>
      <circle r="28" className="copper" strokeDasharray="2 3" opacity="0.35"/>
      <rect x="-22" y="-14" width="44" height="28" fill="#FAF3E0"/>
      <rect x="-22" y="-14" width="44" height="28" className="ink-bold"/>
      {/* chip pins */}
      {[-13,-5,3,11].map(x => <line key={`t${x}`} x1={x} y1="-14" x2={x} y2="-19" className="ink"/>)}
      {[-13,-5,3,11].map(x => <line key={`b${x}`} x1={x} y1="14" x2={x} y2="19" className="ink"/>)}

      <polygon points="-9,-6 9,-6 13,0 9,6 -9,6 -13,0" className="ink-bold" fill="#D97757"/>

    {/* Pipe from chip to drive gear */}
    <path d="M 300 114 Q 300 138 270 150" fill="none" stroke="#D8C8A8" strokeWidth="9" strokeLinecap="round"/>
    <path d="M 300 114 Q 300 138 270 150" className="ink-bold" fill="none"/>

    {/* Steam vent bottom-center with comic puffs */}
    <g transform="translate(195, 240)">
      <rect x="-12" y="-8" width="24" height="14" fill="#D8C8A8"/>
      <rect x="-12" y="-8" width="24" height="14" className="ink-bold"/>
      <rect x="-9" y="-5" width="18" height="8" fill="url(#hatch)"/>
      {/* puffs */}
      <ellipse cx="-2" cy="-16" rx="6" ry="4" fill="#FAF3E0"/>
      <ellipse cx="-2" cy="-16" rx="6" ry="4" className="ink"/>
      <ellipse cx="6" cy="-22" rx="4" ry="3" fill="#FAF3E0"/>
      <ellipse cx="6" cy="-22" rx="4" ry="3" className="ink"/>
    </g>

    {/* Comic burst — "CLANK!" between gears */}
    <Burst x={200} y={170} r={22} text="CLANK!" rot={-8} points={12}/>

    {/* Annotations */}
    <text x="140" y="118" className="label" textAnchor="middle">GEAR · 14T</text>
    <text x="258" y="124" className="label" textAnchor="middle">DRIVE · 10T</text>
    <Arrow x1="370" y1="180" x2="296" y2="170" bold/>
    <text x="370" y="183" className="label" textAnchor="end">RATIO 1.4:1</text>

    {/* Dimensions */}
    <DimX x1="40" x2="360" y={285} label="W. 320" />
    <DimY y1="55" y2="265" x={28} label="H. 210" />

    {/* corners */}
    <g className="copper-bold">
      <line x1="20" y1="20" x2="28" y2="20"/><line x1="24" y1="16" x2="24" y2="24"/>
      <line x1="372" y1="20" x2="380" y2="20"/><line x1="376" y1="16" x2="376" y2="24"/>
      <line x1="20" y1="300" x2="28" y2="300"/><line x1="24" y1="296" x2="24" y2="304"/>
      <line x1="372" y1="300" x2="380" y2="300"/><line x1="376" y1="296" x2="376" y2="304"/>
    </g>
  </svg>
);

const Frame = ({ tag, name, italic, fig, cta, children }) => (
  <div className="parchment" style={{width:'100%', height:'100%'}}>
    <div className="stage">
      <div className="head">
        <div>
          <div className="tag">{tag}</div>
          <div className="name">{name}</div>
          <div className="italic">{italic}</div>
        </div>
        <div className="ver">v.2026.05 · ↤ UP ↦</div>
      </div>
      <div className="center">{children}</div>
      <div className="foot">
        <div className="cap">{fig}</div>
        <div className="cta">┌──→ {cta}</div>
      </div>
    </div>
  </div>
);

const App = () => (
  <DesignCanvas title="Imagery exploration · Codex × Comic mechanical">
    <DCSection id="comic" title="Da Vinci × comic-book mechanical" subtitle="Heavier ink lines, exposed pistons, motion swooshes, comic starbursts. Same parchment chrome, pulpier illustration.">

    <DCSection id="inline" title="In context — landing-card size">
      <DCArtboard id="press-comic-sm" label="Press Mk II · in card" width={420} height={520}>
        <Frame tag="● TIER 01" name="The Press" italic="the rapid response"
          fig="FIG 1.1 · Twin-piston screw press." cta="Start a brief">

      </DCArtboard>
      <DCArtboard id="engine-comic-sm" label="Engine Mk II · in card" width={420} height={520}>

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
