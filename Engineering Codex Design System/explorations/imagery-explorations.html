<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Imagery exploration — three apparatus directions</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #1a1a1a; }
  /* shared parchment surface */
  .parchment {
    background:
      radial-gradient(ellipse at center, #F0E6D2 0%, #E0D2B5 100%);
    color: var(--fg-on-paper);
    position: relative;
    overflow: hidden;
  }
  .parchment::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.18'/></svg>");
    mix-blend-mode: multiply; pointer-events: none;
  }
  .parchment::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(80,50,20,0.18) 100%);
    pointer-events: none;
  }
  .stage {
    width: 100%; height: 100%;
    padding: 32px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 16px;
    position: relative; z-index: 1;
    box-sizing: border-box;
  }
  .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #8B3A1F; white-space: nowrap; }
  .ver { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: #6B5D45; white-space: nowrap; }
  .name { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.01em; color: #2A1810; margin-top: 4px; white-space: nowrap; }
  .italic { font-family: var(--font-display); font-style: italic; font-size: 15px; color: #6B5D45; margin-top: 2px; }
  .center { display: flex; align-items: center; justify-content: center; }
  .center svg { width: 100%; height: 100%; max-height: 360px; }
  .foot { display: flex; justify-content: space-between; align-items: end; gap: 16px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: #6B5D45; letter-spacing: 0.05em; line-height: 1.4; }
  .cta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #B85F40; white-space: nowrap; }
  /* Lucide-ish hand-drawn stroke */
  .ink { stroke: #3A2818; fill: none; stroke-width: 1.1; stroke-linecap: round; stroke-linejoin: round; }
  .ink-thin { stroke: #5A4530; fill: none; stroke-width: 0.6; stroke-linecap: round; }
  .copper { stroke: #B85F40; fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
  .copper-fill { fill: #B85F40; }
  .sepia-fill { fill: #6B5D45; }
  .ink-fill { fill: #3A2818; }
  .dim { stroke: #B85F40; fill: none; stroke-width: 0.5; stroke-dasharray: 2 1.5; }
  .label { font-family: 'JetBrains Mono', monospace; fill: #B85F40; font-size: 7px; letter-spacing: 0.1em; }
  .label-ink { font-family: 'JetBrains Mono', monospace; fill: #3A2818; font-size: 7px; letter-spacing: 0.05em; }
  .logo-text { font-family: 'JetBrains Mono', monospace; fill: #2A1810; font-size: 6px; font-weight: 700; letter-spacing: 0.05em; }
  .hatch-bg { fill: url(#hatch); }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">

// Shared SVG defs (hatching for shadow areas)
const Defs = () => (
  <defs>
    <pattern id="hatch" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#3A2818" strokeWidth="0.35" opacity="0.7" />
    </pattern>
    <pattern id="hatch-soft" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#5A4530" strokeWidth="0.3" opacity="0.5" />
    </pattern>
  </defs>
);

// Reusable: dimension lines around a feature
const DimX = ({ x1, x2, y, label }) => (
  <g>
    <line x1={x1} y1={y} x2={x2} y2={y} className="dim" />
    <line x1={x1} y1={y-2} x2={x1} y2={y+2} className="dim" />
    <line x1={x2} y1={y-2} x2={x2} y2={y+2} className="dim" />
    <text x={(x1+x2)/2} y={y-3} className="label" textAnchor="middle">{label}</text>
  </g>
);
const DimY = ({ y1, y2, x, label }) => (
  <g>
    <line x1={x} y1={y1} x2={x} y2={y2} className="dim" />
    <line x1={x-2} y1={y1} x2={x+2} y2={y1} className="dim" />
    <line x1={x-2} y1={y2} x2={x+2} y2={y2} className="dim" />
    <text x={x-3} y={(y1+y2)/2} className="label" textAnchor="end" transform={`rotate(-90 ${x-3} ${(y1+y2)/2})`}>{label}</text>
  </g>
);

// Arrow annotation
const Arrow = ({ x1, y1, x2, y2 }) => {
  const a = Math.atan2(y2-y1, x2-x1);
  const ah = 4;
  return (
    <g className="copper">
      <line x1={x1} y1={y1} x2={x2} y2={y2} />
      <line x1={x2} y1={y2} x2={x2 - ah*Math.cos(a-0.4)} y2={y2 - ah*Math.sin(a-0.4)} />
      <line x1={x2} y1={y2} x2={x2 - ah*Math.cos(a+0.4)} y2={y2 - ah*Math.sin(a+0.4)} />
    </g>
  );
};

// ─────────────────────────────────────────────────────
// DIRECTION 01 — "THE PRESS"
// Da Vinci handpress: heavy frame, screw-press, tray with documents.
// Copper accents on screw + lever. Tech logo embedded in the printed page.
// ─────────────────────────────────────────────────────
const PressApparatus = () => (
  <svg viewBox="0 0 400 320" preserveAspectRatio="xMidYMid meet">
    <Defs />
    {/* Frame uprights */}
    <rect x="60" y="40" width="14" height="220" className="ink" fill="#E8DCC0"/>
    <rect x="326" y="40" width="14" height="220" className="ink" fill="#E8DCC0"/>
    {/* Crossbeam top */}
    <rect x="50" y="30" width="300" height="22" className="ink" fill="#D8C8A8"/>
    {/* Wood grain hatching */}
    <rect x="60" y="40" width="14" height="220" className="hatch-bg" opacity="0.4"/>
    <rect x="326" y="40" width="14" height="220" className="hatch-bg" opacity="0.4"/>
    {/* Screw column */}
    <line x1="200" y1="52" x2="200" y2="160" className="ink" strokeWidth="2"/>
    {/* Screw threads */}
    {[60,75,90,105,120,135,150].map(y => (
      <ellipse key={y} cx="200" cy={y} rx="14" ry="3" className="ink-thin" />
    ))}
    {/* Top knob — copper */}
    <circle cx="200" cy="42" r="10" className="copper" fill="#D97757" opacity="0.85"/>
    <circle cx="200" cy="42" r="6" className="ink-thin"/>
    {/* Lever arm — copper */}
    <line x1="200" y1="42" x2="280" y2="20" className="copper" strokeWidth="2"/>
    <circle cx="280" cy="20" r="4" className="copper-fill"/>
    {/* Press platen */}
    <rect x="140" y="160" width="120" height="14" className="ink" fill="#E8DCC0"/>
    <rect x="140" y="160" width="120" height="14" className="hatch-bg" opacity="0.3"/>
    {/* Tray (parchment beneath) */}
    <rect x="120" y="195" width="160" height="55" className="ink" fill="#FAF3E0"/>
    {/* Document on tray with embedded logo + text lines */}
    <line x1="135" y1="208" x2="265" y2="208" className="ink-thin"/>
    <line x1="135" y1="215" x2="240" y2="215" className="ink-thin"/>
    <line x1="135" y1="222" x2="255" y2="222" className="ink-thin"/>
    {/* Embedded tech logo: stylized "G" in a rounded square (nod to a search engine) */}
    <rect x="135" y="230" width="14" height="14" className="ink" fill="#FAF3E0"/>
    <text x="142" y="241" className="logo-text" textAnchor="middle">G</text>
    <line x1="155" y1="237" x2="220" y2="237" className="ink-thin"/>
    <line x1="155" y1="244" x2="200" y2="244" className="ink-thin"/>
    {/* Base */}
    <rect x="40" y="250" width="320" height="18" className="ink" fill="#D8C8A8"/>
    {/* Feet */}
    <rect x="55" y="268" width="20" height="8" className="ink" fill="#E8DCC0"/>
    <rect x="325" y="268" width="20" height="8" className="ink" fill="#E8DCC0"/>
    {/* Arrows + dimension */}
    <Arrow x1="105" y1="100" x2="138" y2="160" />
    <text x="65" y="98" className="label">PLATEN</text>
    <Arrow x1="295" y1="220" x2="265" y2="222" />
    <text x="298" y="223" className="label">8 PG</text>
    <DimX x1="120" x2="280" y={283} label="W. 160" />
    <DimY y1="40" y2="250" x={28} label="H. 210" />
    {/* UP marker */}
    <g transform="translate(360,40)">
      <line x1="0" y1="6" x2="0" y2="-2" className="copper"/>
      <line x1="-2" y1="0" x2="0" y2="-3" className="copper"/>
      <line x1="2" y1="0" x2="0" y2="-3" className="copper"/>
      <text x="4" y="2" className="label">UP</text>
    </g>
    {/* corner cross-marks */}
    <g className="copper">
      <line x1="20" y1="20" x2="26" y2="20"/><line x1="23" y1="17" x2="23" y2="23"/>
      <line x1="374" y1="20" x2="380" y2="20"/><line x1="377" y1="17" x2="377" y2="23"/>
      <line x1="20" y1="300" x2="26" y2="300"/><line x1="23" y1="297" x2="23" y2="303"/>
      <line x1="374" y1="300" x2="380" y2="300"/><line x1="377" y1="297" x2="377" y2="303"/>
    </g>
  </svg>
);

// ─────────────────────────────────────────────────────
// DIRECTION 02 — "THE ENGINE"
// Steampunk gear assembly: two intermeshing brass gears,
// pressure gauge with copper face, pipe routing, embedded chip motif.
// Heavier on industrial detail, more mechanical.
// ─────────────────────────────────────────────────────
const EngineApparatus = () => (
  <svg viewBox="0 0 400 320" preserveAspectRatio="xMidYMid meet">
    <Defs />
    {/* Mounting plate */}
    <rect x="40" y="60" width="320" height="200" className="ink" fill="#E8DCC0" rx="0"/>
    <rect x="40" y="60" width="320" height="200" className="hatch-bg" opacity="0.25"/>
    {/* Rivets in corners */}
    {[[55,75],[345,75],[55,245],[345,245]].map(([x,y],i) => (
      <g key={i}>
        <circle cx={x} cy={y} r="3" className="ink" fill="#B85F40" opacity="0.7"/>
        <circle cx={x} cy={y} r="1" className="ink-fill"/>
      </g>
    ))}
    {/* LEFT GEAR */}
    <g transform="translate(135, 165)">
      {/* gear teeth */}
      {Array.from({length:14}).map((_,i) => {
        const a = (i / 14) * Math.PI * 2;
        const r1 = 38, r2 = 46;
        const ang = 0.2;
        const x1 = Math.cos(a-ang) * r1, y1 = Math.sin(a-ang) * r1;
        const x2 = Math.cos(a-ang*0.7) * r2, y2 = Math.sin(a-ang*0.7) * r2;
        const x3 = Math.cos(a+ang*0.7) * r2, y3 = Math.sin(a+ang*0.7) * r2;
        const x4 = Math.cos(a+ang) * r1, y4 = Math.sin(a+ang) * r1;
        return <path key={i} d={`M${x1},${y1} L${x2},${y2} L${x3},${y3} L${x4},${y4}`} className="ink" fill="#D97757" fillOpacity="0.55"/>;
      })}
      <circle r="38" className="ink" fill="#E8DCC0"/>
      <circle r="38" className="hatch-bg" opacity="0.5"/>
      <circle r="22" className="ink" fill="#D8C8A8"/>
      {/* spokes */}
      {[0,60,120,180,240,300].map(a => (
        <line key={a} x1="0" y1="0" x2={Math.cos(a*Math.PI/180)*22} y2={Math.sin(a*Math.PI/180)*22} className="ink-thin"/>
      ))}
      <circle r="8" className="copper" fill="#B85F40"/>
      <circle r="3" className="ink-fill"/>
    </g>
    {/* RIGHT GEAR (smaller) */}
    <g transform="translate(245, 165)">
      {Array.from({length:10}).map((_,i) => {
        const a = (i / 10) * Math.PI * 2;
        const r1 = 26, r2 = 34;
        const ang = 0.25;
        const x1 = Math.cos(a-ang) * r1, y1 = Math.sin(a-ang) * r1;
        const x2 = Math.cos(a-ang*0.7) * r2, y2 = Math.sin(a-ang*0.7) * r2;
        const x3 = Math.cos(a+ang*0.7) * r2, y3 = Math.sin(a+ang*0.7) * r2;
        const x4 = Math.cos(a+ang) * r1, y4 = Math.sin(a+ang) * r1;
        return <path key={i} d={`M${x1},${y1} L${x2},${y2} L${x3},${y3} L${x4},${y4}`} className="ink" fill="#D97757" fillOpacity="0.55"/>;
      })}
      <circle r="26" className="ink" fill="#E8DCC0"/>
      <circle r="26" className="hatch-bg" opacity="0.5"/>
      <circle r="14" className="ink" fill="#D8C8A8"/>
      <circle r="6" className="copper" fill="#B85F40"/>
      <circle r="2" className="ink-fill"/>
    </g>
    {/* PRESSURE GAUGE top-left */}
    <g transform="translate(95, 110)">
      <circle r="22" className="ink" fill="#FAF3E0" strokeWidth="1.5"/>
      <circle r="22" className="copper" strokeWidth="1.5" fill="none"/>
      {/* tick marks */}
      {Array.from({length:9}).map((_,i) => {
        const a = (Math.PI * 1.25) + (i / 8) * (Math.PI * 1.5);
        return <line key={i} x1={Math.cos(a)*16} y1={Math.sin(a)*16} x2={Math.cos(a)*20} y2={Math.sin(a)*20} className="ink-thin"/>;
      })}
      {/* needle pointing toward upper-right */}
      <line x1="0" y1="0" x2="13" y2="-9" className="copper" strokeWidth="1.4"/>
      <circle r="3" className="ink-fill"/>
      <text x="0" y="14" className="label-ink" textAnchor="middle">PSI</text>
    </g>
    {/* Pipe from gauge to gear */}
    <path d="M 95 132 Q 95 155 135 165" className="ink" strokeWidth="2.5"/>
    <path d="M 95 132 Q 95 155 135 165" className="copper" strokeWidth="0.8" opacity="0.6"/>
    {/* Embedded "chip" with brand mark — top right */}
    <g transform="translate(290, 100)">
      <rect x="-22" y="-14" width="44" height="28" className="ink" fill="#FAF3E0"/>
      {/* chip pins */}
      {[-10,-2,6].map(x => <line key={`t${x}`} x1={x} y1="-14" x2={x} y2="-18" className="ink-thin"/>)}
      {[-10,-2,6].map(x => <line key={`b${x}`} x1={x} y1="14" x2={x} y2="18" className="ink-thin"/>)}
      {/* logo: stylized "OAI" hexagon */}
      <polygon points="-8,-6 8,-6 12,0 8,6 -8,6 -12,0" className="ink" fill="none"/>
      <text x="0" y="2" className="logo-text" textAnchor="middle">OAI</text>
    </g>
    {/* Pipe from chip down */}
    <path d="M 290 114 Q 290 145 245 165" className="ink" strokeWidth="2.5"/>
    <path d="M 290 114 Q 290 145 245 165" className="copper" strokeWidth="0.8" opacity="0.6"/>
    {/* Steam release valve bottom */}
    <g transform="translate(190, 235)">
      <rect x="-8" y="-6" width="16" height="12" className="ink" fill="#D8C8A8"/>
      <line x1="-12" y1="0" x2="-8" y2="0" className="ink-thin"/>
      <line x1="8" y1="0" x2="12" y2="0" className="ink-thin"/>
      {/* steam puffs */}
      <path d="M 0 -6 Q -3 -12 0 -16 Q 3 -20 0 -24" className="copper" strokeWidth="0.6" strokeDasharray="1 1"/>
      <path d="M 4 -6 Q 7 -12 4 -16" className="copper" strokeWidth="0.6" strokeDasharray="1 1"/>
    </g>
    {/* Annotations */}
    <text x="135" y="130" className="label" textAnchor="middle">PRIMARY · 14T</text>
    <text x="245" y="135" className="label" textAnchor="middle">DRIVE · 10T</text>
    <Arrow x1="365" y1="170" x2="285" y2="167" />
    <text x="368" y="173" className="label">RATIO 1.4:1</text>
    {/* dimensions */}
    <DimX x1="40" x2="360" y={283} label="W. 320" />
    <DimY y1="60" y2="260" x={28} label="H. 200" />
    {/* corner cross-marks */}
    <g className="copper">
      <line x1="20" y1="20" x2="26" y2="20"/><line x1="23" y1="17" x2="23" y2="23"/>
      <line x1="374" y1="20" x2="380" y2="20"/><line x1="377" y1="17" x2="377" y2="23"/>
      <line x1="20" y1="300" x2="26" y2="300"/><line x1="23" y1="297" x2="23" y2="303"/>
      <line x1="374" y1="300" x2="380" y2="300"/><line x1="377" y1="297" x2="377" y2="303"/>
    </g>
  </svg>
);

// ─────────────────────────────────────────────────────
// DIRECTION 03 — "THE FOUNDRY"
// Codex-style architectural elevation: industrial furnace + chimney,
// crucible, conveyor with documents, embedded server-rack icon.
// More cathedral/industrial; horizon-line composition.
// ─────────────────────────────────────────────────────
const FoundryApparatus = () => (
  <svg viewBox="0 0 400 320" preserveAspectRatio="xMidYMid meet">
    <Defs />
    {/* Ground line */}
    <line x1="20" y1="262" x2="380" y2="262" className="ink"/>
    {[40,80,120,160,200,240,280,320,360].map(x => (
      <line key={x} x1={x} y1="262" x2={x-3} y2="266" className="ink-thin"/>
    ))}
    {/* Chimney left */}
    <polygon points="55,40 75,40 80,260 50,260" className="ink" fill="#E8DCC0"/>
    <polygon points="55,40 75,40 80,260 50,260" className="hatch-bg" opacity="0.35"/>
    <rect x="48" y="36" width="34" height="8" className="ink" fill="#D8C8A8"/>
    {/* Smoke from chimney */}
    <path d="M 65 36 Q 60 25 70 18 Q 80 10 72 2" className="ink-thin" strokeDasharray="2 1.5"/>
    <path d="M 70 36 Q 75 25 65 18" className="ink-thin" strokeDasharray="2 1.5"/>
    {/* Main furnace body */}
    <rect x="100" y="120" width="200" height="142" className="ink" fill="#E8DCC0"/>
    <rect x="100" y="120" width="200" height="142" className="hatch-bg" opacity="0.3"/>
    {/* Furnace roof — stepped */}
    <polygon points="90,120 310,120 295,100 105,100" className="ink" fill="#D8C8A8"/>
    <polygon points="105,100 295,100 280,84 120,84" className="ink" fill="#D8C8A8"/>
    {/* Furnace door — copper-rimmed glowing aperture */}
    <rect x="170" y="170" width="60" height="70" className="ink" fill="#FAF3E0"/>
    <rect x="170" y="170" width="60" height="70" className="copper" fill="none" strokeWidth="1.5"/>
    {/* Glow inside (concentric arcs) */}
    <circle cx="200" cy="205" r="20" className="copper" fill="#D97757" opacity="0.4"/>
    <circle cx="200" cy="205" r="14" className="copper" fill="#D97757" opacity="0.6"/>
    <circle cx="200" cy="205" r="8" className="copper-fill"/>
    {/* Door rivets */}
    {[[175,175],[225,175],[175,235],[225,235]].map(([x,y],i) => (
      <circle key={i} cx={x} cy={y} r="1.5" className="copper-fill"/>
    ))}
    {/* SERVER RACK embedded — left of furnace, "fed" by conveyor into furnace */}
    <g transform="translate(120, 150)">
      <rect x="0" y="0" width="36" height="60" className="ink" fill="#FAF3E0"/>
      {/* rack units */}
      {[8,18,28,38,48].map(y => (
        <g key={y}>
          <line x1="2" y1={y} x2="34" y2={y} className="ink-thin"/>
          <circle cx="6" cy={y-3} r="0.8" className="copper-fill"/>
          <circle cx="9" cy={y-3} r="0.8" className="ink-fill"/>
        </g>
      ))}
      <text x="18" y="56" className="logo-text" textAnchor="middle">SRV·3</text>
    </g>
    {/* Conveyor — goes from server rack into furnace */}
    <line x1="156" y1="195" x2="170" y2="195" className="ink" strokeWidth="2"/>
    <circle cx="158" cy="200" r="3" className="ink" fill="#D8C8A8"/>
    <circle cx="166" cy="200" r="3" className="ink" fill="#D8C8A8"/>
    {/* Output conveyor — right side, with documents */}
    <line x1="230" y1="200" x2="290" y2="200" className="ink" strokeWidth="2"/>
    <line x1="230" y1="210" x2="290" y2="210" className="ink-thin"/>
    {[238,250,262,274,286].map(x => (
      <circle key={x} cx={x} cy="205" r="3" className="ink" fill="#D8C8A8"/>
    ))}
    {/* Document on conveyor */}
    <g transform="translate(270, 178)">
      <rect x="0" y="0" width="16" height="20" className="ink" fill="#FAF3E0"/>
      <line x1="3" y1="5" x2="13" y2="5" className="ink-thin"/>
      <line x1="3" y1="9" x2="11" y2="9" className="ink-thin"/>
      <line x1="3" y1="13" x2="13" y2="13" className="ink-thin"/>
