<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Imagery exploration — Atelier & Field Guide</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #1a1a1a; }
  .parchment {
    background: radial-gradient(ellipse at center, #F0E6D2 0%, #E0D2B5 100%);
    color: var(--fg-on-paper);
    position: relative;
    overflow: hidden;
  }
  .parchment::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.18'/></svg>");
    mix-blend-mode: multiply; pointer-events: none;
  }
  .parchment::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(80,50,20,0.18) 100%);
    pointer-events: none;
  }
  .stage {
    width: 100%; height: 100%;
    padding: 32px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 16px;
    position: relative; z-index: 1;
    box-sizing: border-box;
  }
  .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .head .left { min-width: 0; flex: 1; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #8B3A1F; white-space: nowrap; }
  .ver { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: #6B5D45; white-space: nowrap; }
  .name { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.01em; color: #2A1810; margin-top: 4px; white-space: nowrap; }
  .italic { font-family: var(--font-display); font-style: italic; font-size: 15px; color: #6B5D45; margin-top: 2px; }
  .center { display: flex; align-items: center; justify-content: center; }
  .center svg { width: 100%; height: 100%; max-height: 360px; }
  .foot { display: flex; justify-content: space-between; align-items: end; gap: 16px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: #6B5D45; letter-spacing: 0.05em; line-height: 1.4; }
  .cta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #B85F40; white-space: nowrap; }
  /* Drawing styles */
  .ink { stroke: #3A2818; fill: none; stroke-width: 1.1; stroke-linecap: round; stroke-linejoin: round; }
  .ink-thin { stroke: #5A4530; fill: none; stroke-width: 0.6; stroke-linecap: round; }
  .ink-fine { stroke: #5A4530; fill: none; stroke-width: 0.4; stroke-linecap: round; }
  .copper { stroke: #B85F40; fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
  .copper-thin { stroke: #B85F40; fill: none; stroke-width: 0.6; stroke-linecap: round; }
  .copper-fill { fill: #B85F40; }
  .sepia-fill { fill: #6B5D45; }
  .ink-fill { fill: #3A2818; }
  .dim { stroke: #B85F40; fill: none; stroke-width: 0.5; stroke-dasharray: 2 1.5; }
  .label { font-family: 'JetBrains Mono', monospace; fill: #B85F40; font-size: 7px; letter-spacing: 0.1em; }
  .label-ink { font-family: 'JetBrains Mono', monospace; fill: #3A2818; font-size: 7px; letter-spacing: 0.05em; }
  .latin { font-family: 'GT Sectra', 'Source Serif 4', serif; font-style: italic; fill: #3A2818; font-size: 10px; }
  .scribed { font-family: 'GT Sectra', 'Source Serif 4', serif; fill: #3A2818; font-size: 9px; letter-spacing: 0.05em; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">

const Defs = () => (
  <defs>
    <pattern id="hatch" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#3A2818" strokeWidth="0.35" opacity="0.7" />
    </pattern>
    <pattern id="hatch-light" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#5A4530" strokeWidth="0.3" opacity="0.4" />
    </pattern>
    <pattern id="grid-bp" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#B85F40" strokeWidth="0.2" opacity="0.4"/>
    </pattern>
  </defs>
);

const DimX = ({ x1, x2, y, label }) => (
  <g>
    <line x1={x1} y1={y} x2={x2} y2={y} className="dim" />
    <line x1={x1} y1={y-2} x2={x1} y2={y+2} className="dim" />
    <line x1={x2} y1={y-2} x2={x2} y2={y+2} className="dim" />
    <text x={(x1+x2)/2} y={y-3} className="label" textAnchor="middle">{label}</text>
  </g>
);
const DimY = ({ y1, y2, x, label }) => (
  <g>
    <line x1={x} y1={y1} x2={x} y2={y2} className="dim" />
    <line x1={x-2} y1={y1} x2={x+2} y2={y1} className="dim" />
    <line x1={x-2} y1={y2} x2={x+2} y2={y2} className="dim" />
    <text x={x-3} y={(y1+y2)/2} className="label" textAnchor="end" transform={`rotate(-90 ${x-3} ${(y1+y2)/2})`}>{label}</text>
  </g>
);

const Arrow = ({ x1, y1, x2, y2 }) => {
  const a = Math.atan2(y2-y1, x2-x1);
  const ah = 4;
  return (
    <g className="copper">
      <line x1={x1} y1={y1} x2={x2} y2={y2} />
      <line x1={x2} y1={y2} x2={x2 - ah*Math.cos(a-0.4)} y2={y2 - ah*Math.sin(a-0.4)} />
      <line x1={x2} y1={y2} x2={x2 - ah*Math.cos(a+0.4)} y2={y2 - ah*Math.sin(a+0.4)} />
    </g>
  );
};

// ─────────────────────────────────────────────────────
// DIRECTION A — "THE ATELIER"

    <line x1="292" y1="190" x2="297" y2="190" className="ink-fine"/>

    <g transform="translate(335, 60)">

    {/* Dimensions */}

    <DimY y1="40" y2="260" x={28} label="H. 220" />
    <DimX x1="40" x2="160" y={32} label="120" />
    <DimX x1="160" x2="260" y={32} label="100" />
    <DimX x1="260" x2="360" y={32} label="100" />

      <line x1="374" y1="20" x2="380" y2="20"/><line x1="377" y1="17" x2="377" y2="23"/>

      <line x1="374" y1="300" x2="380" y2="300"/><line x1="377" y1="297" x2="377" y2="303"/>
    </g>
  </svg>
);

// Variant: Atelier — sectional elevation

// ─────────────────────────────────────────────────────
// DIRECTION B — "THE FIELD GUIDE"
// Specimen plate: insect-style binomial labelling,
// scale bar, hand-numbered annotations on parts.
// Each piece treated as a botanical/scientific specimen.
// ─────────────────────────────────────────────────────
const FieldGuideSpecimen = () => (
  <svg viewBox="0 0 400 320" preserveAspectRatio="xMidYMid meet">
    <Defs />
    {/* Plate frame — fine inner border */}
    <rect x="40" y="36" width="320" height="232" className="ink-thin"/>
    {/* "Plate I" mark, top-left */}
    <text x="50" y="50" className="label-ink">PLATE I · TAB. I</text>
    {/* Latin binomial — italic serif, lower-centre */}
    <text x="200" y="245" className="latin" textAnchor="middle">Brevis investigatio · var. octopagina</text>
    <text x="200" y="258" className="label-ink" textAnchor="middle">FAM. RESEARCHACEAE · COLL. 2026</text>
    {/* SPECIMEN — beetle/document hybrid in centre */}
    <g transform="translate(200, 140)">
      {/* Outer body — rounded oval (document folded as carapace) */}
      <ellipse cx="0" cy="0" rx="60" ry="42" className="ink" fill="#E8DCC0"/>

      {/* Median line — page spine */}

      <g>

        {[-30,-22,-14,-6].map(y => <line key={`r${y}`} x1="8" y1={y} x2="50" y2={y} className="ink-fine"/>)}

      {/* Embedded "logo" mark — chip rectangle, in centre top */}
      <rect x="-9" y="-38" width="18" height="10" className="ink" fill="#FAF3E0"/>
      <text x="0" y="-31" className="logo-text" textAnchor="middle">G/AI</text>
      {/* Antennae — copper, rising up */}
      <path d="M -12 -42 Q -20 -56 -10 -68" className="copper-thin"/>
      <circle cx="-10" cy="-68" r="2" className="copper-fill"/>
      <path d="M 12 -42 Q 20 -56 10 -68" className="copper-thin"/>
      <circle cx="10" cy="-68" r="2" className="copper-fill"/>
      {/* Legs — three pairs, hand-drawn */}

        <g key={`lg${i}`}>
          <path d={`M ${x1} ${y1} L ${(x1+x2)/2-2} ${(y1+y2)/2} L ${x2} ${y2}`} className="ink"/>
        </g>
      ))}
      {[[58,-15,72,-8], [58,0,76,4], [58,15,72,28]].map(([x1,y1,x2,y2],i) => (
        <g key={`rg${i}`}>
          <path d={`M ${x1} ${y1} L ${(x1+x2)/2+2} ${(y1+y2)/2} L ${x2} ${y2}`} className="ink"/>
        </g>
      ))}
    </g>
    {/* Numbered annotations with hairlines pointing to parts */}
    {/* 1 — antenna */}
